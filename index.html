<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Gogia Fitness 🏃</title>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #080c14;
      --card: #111827;
      --card2: #1f2937;
      --green: #00e676;
      --orange: #ff6d00;
      --yellow: #ffd600;
      --blue: #448aff;
      --purple: #b388ff;
      --text: #f9fafb;
      --text2: #9ca3af;
      --border: #374151;
    }

    body {
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ─── LOGIN ─── */
    #login-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 32px 24px;
      background: radial-gradient(ellipse at top, #0d1f3c 0%, var(--bg) 60%);
    }

    .logo-wrap { text-align: center; margin-bottom: 52px; }
    .logo-icon { font-size: 3.5rem; display: block; margin-bottom: 12px; animation: bounce 2s infinite; }
    @keyframes bounce {
      0%, 100% { transform: translateY(0); }
      50% { transform: translateY(-8px); }
    }
    .logo-title {
      font-size: 2.8rem;
      font-weight: 900;
      letter-spacing: -1px;
      background: linear-gradient(135deg, #00e676 0%, #448aff 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }
    .logo-sub { color: var(--text2); font-size: 0.95rem; margin-top: 6px; letter-spacing: 2px; text-transform: uppercase; }

    .who-label {
      font-size: 0.8rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text2);
      margin-bottom: 20px;
    }

    .user-cards {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 16px;
      width: 100%;
      max-width: 420px;
    }

    .user-card {
      background: var(--card);
      border: 2px solid var(--border);
      border-radius: 24px;
      padding: 28px 16px;
      text-align: center;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
    }
    .user-card:hover { transform: translateY(-6px) scale(1.02); }
    .user-card.gagan-card { border-color: rgba(0,230,118,0.4); }
    .user-card.gagan-card:hover { border-color: var(--green); box-shadow: 0 0 40px rgba(0,230,118,0.25); }
    .user-card.arjun-card { border-color: rgba(68,138,255,0.4); }
    .user-card.arjun-card:hover { border-color: var(--blue); box-shadow: 0 0 40px rgba(68,138,255,0.25); }

    .user-avatar-big { font-size: 3.5rem; display: block; margin-bottom: 10px; }
    .user-name { font-size: 1.3rem; font-weight: 900; }
    .user-age { font-size: 0.8rem; color: var(--text2); margin-top: 4px; }
    .user-sports { font-size: 0.75rem; color: var(--text2); margin-top: 6px; }

    /* ─── APP SHELL ─── */
    #app { display: none; }
    #app.visible { display: block; }

    .header {
      position: sticky;
      top: 0;
      z-index: 200;
      background: rgba(8,12,20,0.95);
      backdrop-filter: blur(12px);
      border-bottom: 1px solid var(--border);
      padding: 14px 20px;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .header-left { display: flex; align-items: center; gap: 12px; }
    .header-avatar {
      width: 38px; height: 38px; border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      font-size: 1.3rem; font-weight: 900;
    }
    .header-avatar.gagan-av { background: rgba(0,230,118,0.15); border: 2px solid var(--green); }
    .header-avatar.arjun-av { background: rgba(68,138,255,0.15); border: 2px solid var(--blue); }
    .header-name { font-size: 1rem; font-weight: 800; }
    .header-streak { font-size: 0.75rem; color: var(--orange); font-weight: 700; }

    .logout-btn {
      background: none;
      border: 1px solid var(--border);
      color: var(--text2);
      padding: 6px 14px;
      border-radius: 20px;
      cursor: pointer;
      font-size: 0.78rem;
      font-weight: 600;
      transition: all 0.2s;
    }
    .logout-btn:hover { border-color: var(--text2); color: var(--text); }

    .bottom-nav {
      position: fixed;
      bottom: 0; left: 0; right: 0;
      background: rgba(17,24,39,0.97);
      backdrop-filter: blur(12px);
      border-top: 1px solid var(--border);
      display: flex;
      z-index: 200;
      padding-bottom: env(safe-area-inset-bottom, 0);
    }

    .nav-item {
      flex: 1;
      padding: 10px 4px 8px;
      text-align: center;
      cursor: pointer;
      border: none;
      background: none;
      color: var(--text2);
      transition: all 0.2s;
    }
    .nav-item .ni { font-size: 1.3rem; display: block; }
    .nav-item .nl { font-size: 0.6rem; font-weight: 700; display: block; margin-top: 2px; text-transform: uppercase; letter-spacing: 0.5px; }
    .nav-item.active { color: var(--green); }
    .nav-item.active-blue { color: var(--blue); }

    /* ─── PAGE CONTENT ─── */
    .page-content { padding: 20px; padding-bottom: 90px; }
    .view { display: none; }
    .view.active { display: block; animation: slideUp 0.3s ease; }
    @keyframes slideUp { from { opacity: 0; transform: translateY(16px); } to { opacity: 1; transform: translateY(0); } }

    /* ─── CARDS ─── */
    .card {
      background: var(--card);
      border-radius: 18px;
      padding: 18px;
      margin-bottom: 14px;
      border: 1px solid rgba(55,65,81,0.5);
    }
    .card-title {
      font-size: 0.85rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 1px;
      color: var(--text2);
      margin-bottom: 14px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    /* ─── TODAY VIEW ─── */
    .today-hero {
      background: linear-gradient(135deg, #0d2137 0%, #0a1f0a 100%);
      border: 1px solid rgba(0,230,118,0.2);
      border-radius: 20px;
      padding: 24px;
      margin-bottom: 16px;
      position: relative;
      overflow: hidden;
    }
    .today-hero::before {
      content: '';
      position: absolute;
      top: -40px; right: -40px;
      width: 120px; height: 120px;
      background: radial-gradient(circle, rgba(0,230,118,0.15), transparent 70%);
    }
    .today-week-label {
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--green);
    }
    .today-day-title { font-size: 1.9rem; font-weight: 900; margin-top: 4px; line-height: 1; }
    .today-day-sub { color: var(--text2); font-size: 0.85rem; margin-top: 6px; }
    .today-badges { margin-top: 14px; display: flex; gap: 8px; flex-wrap: wrap; }
    .badge {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 4px 12px;
      border-radius: 20px;
      font-size: 0.72rem;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.5px;
    }
    .badge-green { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.3); }
    .badge-orange { background: rgba(255,109,0,0.15); color: var(--orange); border: 1px solid rgba(255,109,0,0.3); }
    .badge-blue { background: rgba(68,138,255,0.15); color: var(--blue); border: 1px solid rgba(68,138,255,0.3); }
    .badge-purple { background: rgba(179,136,255,0.15); color: var(--purple); border: 1px solid rgba(179,136,255,0.3); }

    .section-label {
      font-size: 0.68rem;
      font-weight: 800;
      text-transform: uppercase;
      letter-spacing: 2px;
      color: var(--text2);
      padding: 8px 0 10px;
      border-bottom: 1px solid var(--border);
      margin-bottom: 6px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .exercise-item {
      display: flex;
      align-items: flex-start;
      gap: 12px;
      padding: 13px 0;
      border-bottom: 1px solid rgba(55,65,81,0.4);
      cursor: pointer;
      transition: all 0.2s;
    }
    .exercise-item:last-child { border-bottom: none; }
    .exercise-item:hover { background: rgba(255,255,255,0.02); border-radius: 8px; padding-left: 8px; padding-right: 8px; margin: 0 -8px; }

    .ex-check {
      width: 26px; height: 26px;
      border: 2px solid var(--border);
      border-radius: 50%;
      display: flex; align-items: center; justify-content: center;
      flex-shrink: 0;
      margin-top: 2px;
      transition: all 0.25s cubic-bezier(.34,1.56,.64,1);
      font-size: 0.8rem;
    }
    .exercise-item.done .ex-check {
      background: var(--green);
      border-color: var(--green);
      animation: pop 0.3s ease;
    }
    @keyframes pop { 0% { transform: scale(1); } 50% { transform: scale(1.4); } 100% { transform: scale(1); } }

    .ex-emoji { font-size: 1.3rem; flex-shrink: 0; padding-top: 2px; }
    .ex-info { flex: 1; }
    .ex-name { font-weight: 700; font-size: 0.93rem; }
    .exercise-item.done .ex-name { text-decoration: line-through; color: var(--text2); }
    .ex-detail { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }
    .ex-note { font-size: 0.73rem; color: #6b7280; margin-top: 4px; font-style: italic; }

    .workout-complete-btn {
      width: 100%;
      padding: 18px;
      border-radius: 16px;
      border: none;
      font-size: 1.05rem;
      font-weight: 900;
      cursor: pointer;
      letter-spacing: 0.5px;
      transition: all 0.2s;
      margin-top: 20px;
    }
    .workout-complete-btn:hover { transform: scale(1.02); }
    .workout-complete-btn:active { transform: scale(0.98); }
    .wcb-gagan { background: linear-gradient(135deg, #00e676, #00bfa5); color: #000; }
    .wcb-arjun { background: linear-gradient(135deg, #448aff, #7c4dff); color: #fff; }
    .workout-complete-btn.already-done {
      background: var(--card2);
      color: var(--green);
      border: 2px solid var(--green);
      cursor: default;
    }
    .workout-complete-btn.already-done:hover { transform: none; }

    /* Progress bar */
    .progress-bar {
      height: 6px;
      background: var(--card2);
      border-radius: 3px;
      overflow: hidden;
      margin: 8px 0 4px;
    }
    .progress-fill {
      height: 100%;
      border-radius: 3px;
      transition: width 0.6s ease;
    }
    .pf-green { background: linear-gradient(90deg, var(--green), #00bfa5); }
    .pf-blue { background: linear-gradient(90deg, var(--blue), var(--purple)); }
    .pf-orange { background: linear-gradient(90deg, var(--orange), var(--yellow)); }
    .progress-label { font-size: 0.72rem; color: var(--text2); display: flex; justify-content: space-between; }

    /* Stats row */
    .stats-row {
      display: grid;
      grid-template-columns: repeat(3, 1fr);
      gap: 10px;
      margin-bottom: 14px;
    }
    .stat-card {
      background: var(--card);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }
    .stat-val { font-size: 1.6rem; font-weight: 900; line-height: 1; }
    .stat-lbl { font-size: 0.65rem; color: var(--text2); margin-top: 4px; text-transform: uppercase; letter-spacing: 0.5px; }

    /* ─── PROGRAM VIEW ─── */
    .week-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      padding-bottom: 4px;
      margin-bottom: 20px;
    }
    .week-tab {
      flex-shrink: 0;
      padding: 8px 16px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .week-tab.active { background: var(--green); color: #000; border-color: var(--green); }
    .week-tab.done-week { border-color: rgba(0,230,118,0.4); color: rgba(0,230,118,0.7); }

    .phase-banner {
      background: linear-gradient(135deg, #1a1f2e, #0d1f14);
      border: 1px solid rgba(0,230,118,0.2);
      border-radius: 14px;
      padding: 14px 18px;
      margin-bottom: 16px;
      display: flex;
      align-items: center;
      gap: 12px;
    }
    .phase-icon { font-size: 1.8rem; }
    .phase-name { font-size: 1rem; font-weight: 800; }
    .phase-desc { font-size: 0.78rem; color: var(--text2); margin-top: 2px; }

    .day-grid {
      display: grid;
      grid-template-columns: repeat(7, 1fr);
      gap: 6px;
      margin-bottom: 16px;
    }
    .day-cell {
      aspect-ratio: 0.8;
      border-radius: 12px;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 2px;
      background: var(--card);
      border: 1px solid var(--border);
      cursor: pointer;
      transition: all 0.2s;
      padding: 4px 2px;
    }
    .day-cell:hover { border-color: var(--green); transform: translateY(-2px); }
    .day-cell.dc-today { border-color: var(--orange); box-shadow: 0 0 14px rgba(255,109,0,0.3); }
    .day-cell.dc-done { background: rgba(0,230,118,0.1); border-color: rgba(0,230,118,0.5); }
    .day-cell.dc-strength { }
    .day-cell.dc-recovery { background: rgba(179,136,255,0.07); }
    .dc-abbr { font-size: 0.5rem; font-weight: 700; text-transform: uppercase; color: var(--text2); letter-spacing: 0.5px; }
    .dc-num { font-size: 0.85rem; font-weight: 800; }
    .dc-type { font-size: 0.65rem; }
    .dc-check { font-size: 0.7rem; color: var(--green); }

    .week-detail-card {
      background: var(--card);
      border-radius: 14px;
      overflow: hidden;
      margin-bottom: 10px;
    }
    .wdc-header {
      padding: 14px 16px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      border-bottom: 1px solid var(--border);
    }
    .wdc-left { display: flex; align-items: center; gap: 10px; }
    .wdc-day { font-size: 0.72rem; font-weight: 700; color: var(--text2); text-transform: uppercase; }
    .wdc-name { font-size: 0.92rem; font-weight: 800; }
    .wdc-arrow { color: var(--text2); font-size: 0.8rem; transition: transform 0.2s; }
    .wdc-arrow.open { transform: rotate(180deg); }
    .wdc-body { display: none; padding: 14px 16px; }
    .wdc-body.open { display: block; }
    .wdc-ex { font-size: 0.82rem; color: var(--text2); padding: 4px 0; display: flex; gap: 8px; }
    .wdc-ex-name { color: var(--text); font-weight: 600; }
    .wdc-mark-btn {
      width: 100%; margin-top: 14px; padding: 12px;
      border-radius: 12px; border: none; font-size: 0.88rem; font-weight: 800;
      cursor: pointer; transition: all 0.2s;
    }
    .wdc-mark-btn.mark-done { background: rgba(0,230,118,0.15); color: var(--green); border: 1px solid rgba(0,230,118,0.4); }
    .wdc-mark-btn.mark-done:hover { background: rgba(0,230,118,0.25); }
    .wdc-mark-btn.mark-undo { background: rgba(0,230,118,0.08); color: var(--text2); border: 1px solid var(--border); }
    .wdc-mark-btn.mark-undo:hover { background: rgba(255,255,255,0.05); }

    /* ─── NUTRITION VIEW ─── */
    .meal-tabs {
      display: flex;
      gap: 8px;
      overflow-x: auto;
      margin-bottom: 20px;
      padding-bottom: 4px;
    }
    .meal-tab {
      flex-shrink: 0;
      padding: 8px 18px;
      border-radius: 20px;
      border: 1px solid var(--border);
      background: none;
      color: var(--text2);
      cursor: pointer;
      font-weight: 700;
      font-size: 0.82rem;
      transition: all 0.2s;
    }
    .meal-tab.active { background: var(--orange); color: #fff; border-color: var(--orange); }

    .meal-card {
      background: var(--card);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 12px;
      border-left: 3px solid var(--orange);
      transition: all 0.2s;
    }
    .meal-card:hover { transform: translateX(3px); }
    .meal-header { display: flex; align-items: center; gap: 10px; margin-bottom: 8px; }
    .meal-icon { font-size: 1.5rem; }
    .meal-name { font-weight: 800; font-size: 0.95rem; }
    .meal-desc { color: var(--text2); font-size: 0.82rem; line-height: 1.5; }
    .meal-why {
      background: rgba(255,109,0,0.08);
      border: 1px solid rgba(255,109,0,0.2);
      border-radius: 8px;
      padding: 8px 12px;
      font-size: 0.75rem;
      color: #ffa040;
      margin-top: 10px;
      display: flex;
      gap: 6px;
      align-items: flex-start;
    }
    .meal-tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .meal-tag {
      padding: 2px 8px;
      border-radius: 10px;
      font-size: 0.68rem;
      font-weight: 700;
      background: rgba(255,255,255,0.07);
      color: var(--text2);
    }

    /* Hydration tip */
    .hydration-tip {
      background: linear-gradient(135deg, rgba(68,138,255,0.1), rgba(0,230,118,0.1));
      border: 1px solid rgba(68,138,255,0.3);
      border-radius: 14px;
      padding: 16px;
      margin-bottom: 16px;
      display: flex;
      gap: 12px;
      align-items: flex-start;
    }

    /* ─── VIDEOS VIEW ─── */
    .vid-tabs {
      display: flex; gap: 8px; overflow-x: auto; padding-bottom: 4px; margin-bottom: 18px;
    }
    .vid-tab {
      flex-shrink: 0; padding: 8px 14px; border-radius: 20px;
      border: 1px solid var(--border); background: none; color: var(--text2);
      cursor: pointer; font-weight: 700; font-size: 0.8rem; transition: all 0.2s;
      white-space: nowrap;
    }
    .vid-tab:hover { border-color: var(--text2); color: var(--text); }
    .vid-header-card {
      display: flex; gap: 12px; align-items: flex-start;
      background: var(--card); border-radius: 14px; padding: 16px; margin-bottom: 16px;
      border: 1px solid rgba(255,255,255,0.06);
    }
    .vid-header-icon { font-size: 2rem; flex-shrink: 0; }
    .vid-header-title { font-size: 1rem; font-weight: 800; }
    .vid-header-desc { font-size: 0.8rem; color: var(--text2); margin-top: 4px; line-height: 1.5; }
    .vid-card {
      background: var(--card); border-radius: 16px; padding: 16px;
      margin-bottom: 16px; border: 1px solid rgba(255,255,255,0.06);
    }
    .vid-title { font-weight: 800; font-size: 0.93rem; margin-bottom: 8px; line-height: 1.4; }
    .vid-why {
      font-size: 0.78rem; color: var(--green);
      background: rgba(0,230,118,0.08); border: 1px solid rgba(0,230,118,0.2);
      border-radius: 8px; padding: 7px 10px; margin-bottom: 12px;
    }
    .vid-thumb-wrap {
      position: relative; border-radius: 12px; overflow: hidden;
      cursor: pointer; display: block; text-decoration: none;
    }
    .vid-thumb-wrap img {
      width: 100%; display: block; border-radius: 12px;
      transition: transform 0.2s; aspect-ratio: 16/9; object-fit: cover;
      background: #111;
    }
    .vid-thumb-wrap:hover img { transform: scale(1.02); }
    .vid-play-btn {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -50%);
      width: 60px; height: 60px; border-radius: 50%;
      background: rgba(255,0,0,0.9);
      display: flex; align-items: center; justify-content: center;
      font-size: 1.4rem; transition: transform 0.2s;
      box-shadow: 0 4px 20px rgba(0,0,0,0.5);
    }
    .vid-thumb-wrap:hover .vid-play-btn { transform: translate(-50%, -50%) scale(1.1); }
    .vid-open-label {
      margin-top: 8px;
      font-size: 0.75rem; color: var(--text2); text-align: center;
      display: flex; align-items: center; justify-content: center; gap: 4px;
    }

    /* ─── REWARDS VIEW ─── */
    .rewards-hero {
      background: linear-gradient(135deg, #1a1200, #1a0a00);
      border: 2px solid rgba(255,214,0,0.4);
      border-radius: 22px;
      padding: 32px 24px;
      text-align: center;
      margin-bottom: 20px;
      position: relative;
      overflow: hidden;
    }
    .rewards-hero::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at top, rgba(255,214,0,0.08), transparent 60%);
    }
    .ebike-emoji { font-size: 5rem; display: block; animation: float 3s ease-in-out infinite; }
    @keyframes float { 0%,100% { transform: translateY(0); } 50% { transform: translateY(-10px); } }
    .reward-title { font-size: 1.5rem; font-weight: 900; margin-top: 12px; }
    .reward-sub { color: var(--text2); font-size: 0.88rem; margin-top: 6px; line-height: 1.5; }
    .reward-locked { font-size: 0.78rem; color: var(--yellow); font-weight: 700; margin-top: 14px; display: flex; align-items: center; justify-content: center; gap: 6px; }

    .goal-card {
      background: var(--card);
      border-radius: 16px;
      padding: 20px;
      margin-bottom: 14px;
    }
    .goal-event { font-size: 1rem; font-weight: 800; margin-bottom: 14px; display: flex; align-items: center; gap: 8px; }

    .time-comparison {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      margin: 14px 0;
    }
    .tc-box {

    dayOfWeek,
    phase,
    isSunday,
    isStrength,
    sections: [

const _sb = supabase.createClient(
  'https://lbyvrbhfxdynmuzzzqye.supabase.co',

function storageKey(user, key) { return `gogia_${user}_${key}`; }

function getSavedData(user, key, def) {
  try {
    const v = localStorage.getItem(storageKey(user, key));
    return v !== null ? JSON.parse(v) : def;
  } catch(e) { return def; }
}

function saveData(user, key, val) {
  try { localStorage.setItem(storageKey(user, key), JSON.stringify(val)); } catch(e) {}
  _sb.from('user_data')
    .upsert({ user_name: user, key, value: JSON.stringify(val) }, { onConflict: 'user_name,key' })
    .then(({ error }) => { if (error) console.error('Supabase save error:', key, error); });
}

async function loadUserDataFromSupabase(user) {
  const { data, error } = await _sb.from('user_data').select('key, value').eq('user_name', user);
  if (error || !data) return;
  data.forEach(row => {
    try { localStorage.setItem(storageKey(user, row.key), row.value); } catch(e) {}
  });
}

function getDoneSet(user) {
  return getSavedData(user, 'done_workouts', {});
}

function markWorkoutDone(user, week, dayOfWeek) {
  const done = getDoneSet(user);
  done[`${week}_${dayOfWeek}`] = true;
  saveData(user, 'done_workouts', done);
}

function isWorkoutDone(user, week, dayOfWeek) {
  return !!getDoneSet(user)[`${week}_${dayOfWeek}`];
}

function getCompletedCount(user) {
  return Object.keys(getDoneSet(user)).length;
}

function getStreak(user) {
  return getSavedData(user, 'streak', 0);
}

function getTimes(user) {
  return getSavedData(user, 'times', {
    baseline_100m: null, w3_100m: null, w6_100m: null,
    baseline_800m: null, w3_800m: null, w6_800m: null,
  });
}

function saveTimes(user, times) {

}

function getDayExDone(user, week, dayOfWeek) {

}
function saveExDone(user, week, dayOfWeek, data) {

// ═══════════════════════════════════════════
//  CURRENT DATE → WEEK + DAY
// ═══════════════════════════════════════════
function localDateStr(d) {
  return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`;
}

function getProgramStartDate(user) {
  // One-time migration: stored dates used toISOString() (UTC), which shifts the date
  // ahead for users in negative-offset timezones (e.g. PST). Subtract 1 day to correct.
  if (!getSavedData(user, 'start_date_v2', false)) {
    const existing = getSavedData(user, 'start_date', null);
    if (existing) {
      const d = new Date(existing + 'T00:00:00');
      d.setDate(d.getDate() - 1);
      localStorage.setItem(storageKey(user, 'start_date'), JSON.stringify(localDateStr(d)));
      _sb.from('user_data')
        .upsert({ user_name: user, key: 'start_date', value: JSON.stringify(localDateStr(d)) }, { onConflict: 'user_name,key' })
        .then(({ error }) => { if (error) console.error('Supabase migration error:', error); });
    }
    saveData(user, 'start_date_v2', true);
  }

  let stored = getSavedData(user, 'start_date', null);
  if (!stored) {
    stored = localDateStr(new Date());
    saveData(user, 'start_date', stored);
  }
  return new Date(stored + 'T00:00:00');
}

function getCurrentWeekAndDay(user) {
  const start = getProgramStartDate(user);
  const today = new Date();
  today.setHours(0, 0, 0, 0);
  const diffMs = today - start;
  const diffDays = Math.floor(diffMs / 86400000);
  if (diffDays < 0) return { week: 1, dayOfWeek: 0 };
  const week = Math.min(Math.floor(diffDays / 7) + 1, 6);
  const dayOfWeek = diffDays % 7;
  return { week, dayOfWeek };
}

  if (target) target.classList.add('active');

  // Update nav
  document.querySelectorAll('.nav-item').forEach(n => {
    n.classList.toggle('active', n.dataset.view === viewId);
  });

  // Render content
  if (viewId === 'today')     renderToday();
  if (viewId === 'program')   renderProgram();

        <div class="section-label">${section.label}</div>
        ${exHtml}
      </div>
    `;
  });

  const completeBtn = done
    ? `<button class="workout-complete-btn already-done">✅ Workout Complete — Crushing It!</button>`
    : `<button class="workout-complete-btn ${isGagan ? 'wcb-gagan' : 'wcb-arjun'}" onclick="completeWorkout()">
        Mark Today's Workout Done 🔥
       </button>`;

  // Count total exercises done today
  const totalEx = day.sections.reduce((a, s) => a + s.exercises.length, 0);
  const doneEx = Object.keys(exDone).length;
  const pct = totalEx ? Math.round((doneEx / totalEx) * 100) : 0;

  document.getElementById('today-content').innerHTML = `
    <div class="today-hero">
      <div class="today-week-label">${phase.icon} Week ${week} • ${phase.name} Phase</div>

      <div class="stat-card">
        <div class="stat-val" style="color:${accentColor}">${completed}</div>
        <div class="stat-lbl">Workouts Done</div>
      </div>
      <div class="stat-card">
        <div class="stat-val">${total - completed}</div>
        <div class="stat-lbl">Left in Program</div>
      </div>
      <div class="stat-card">
        <div class="stat-val" style="color:var(--orange)">${Math.round((completed/total)*100)}%</div>
        <div class="stat-lbl">Complete</div>
      </div>
    </div>

    <div class="card" style="margin-bottom:14px;">

      <div class="progress-bar">
        <div class="progress-fill ${isGagan ? 'pf-green' : 'pf-blue'}" style="width:${pct}%"></div>

function toggleEx(sectionId, idx) {
  const user = currentUser;
  const { week, dayOfWeek } = getCurrentWeekAndDay(user);
  const exDone = getDayExDone(user, week, dayOfWeek);
  const key = `${sectionId}_${idx}`;
  if (exDone[key]) {
    delete exDone[key];
  } else {
    exDone[key] = true;
  }
  saveExDone(user, week, dayOfWeek, exDone);
  renderToday();
}

function completeWorkout() {
  const user = currentUser;
  const { week, dayOfWeek } = getCurrentWeekAndDay(user);
  markWorkoutDone(user, week, dayOfWeek);

  // Update streak
  const streak = getStreak(user);
  saveData(user, 'streak', streak + 1);
  document.getElementById('hdr-streak').textContent = `🔥 ${streak + 1} day streak`;

  showToast('🔥 Workout complete! You crushed it!');
  renderToday();
}

function renderVideos() {
  const cat = VIDEO_CATS[currentVideoCategory];

  const tabsHtml = VIDEO_CATS.map((c, i) => {
    const isActive = i === currentVideoCategory;
    const style = isActive
      ? `background:${c.color};border-color:${c.color};color:${c.color === '#ffd600' ? '#000' : '#fff'};`
      : '';
    return `<button class="vid-tab" style="${style}" onclick="switchVideoCategory(${i})">${c.icon} ${c.label}</button>`;
  }).join('');

  const videosHtml = cat.videos.map(v => `
    <div class="vid-card">
      <div class="vid-title">▶ ${v.title}</div>
      <div class="vid-why">⚡ ${v.why}</div>
      <a class="vid-thumb-wrap" href="https://www.youtube.com/watch?v=${v.id}" target="_blank">
        <img
          src="https://img.youtube.com/vi/${v.id}/hqdefault.jpg"
          alt="${v.title}"
          loading="lazy"
        />
        <div class="vid-play-btn">▶</div>
      </a>
      <div class="vid-open-label">▶ Tap to open in YouTube</div>
    </div>
  `).join('');

  document.getElementById('videos-content').innerHTML = `
    <div class="vid-header-card">
      <div class="vid-header-icon">${cat.icon}</div>
      <div>
        <div class="vid-header-title">${cat.label}</div>
        <div class="vid-header-desc">${cat.desc}</div>
      </div>
    </div>
    <div class="vid-tabs">${tabsHtml}</div>
    ${videosHtml}
  `;
}

function switchVideoCategory(idx) {
  currentVideoCategory = idx;
  renderVideos();
}

// ═══════════════════════════════════════════
//  REWARDS VIEW (Gagan only)
// ═══════════════════════════════════════════
function renderRewards() {
  if (currentUser !== 'gagan') return;
  const times = getTimes('gagan');
  const completed = getCompletedCount('gagan');
  const pct = Math.round((completed / 42) * 100);

  function calcImprovement(baseline, current) {
    if (!baseline || !current) return null;
    const pctChange = ((baseline - current) / baseline) * 100;
    return pctChange.toFixed(1);
  }

  const imp100_3 = calcImprovement(times.baseline_100m, times.w3_100m);
  const imp100_6 = calcImprovement(times.baseline_100m, times.w6_100m);
  const imp800_3 = calcImprovement(times.baseline_800m, times.w3_800m);
  const imp800_6 = calcImprovement(times.baseline_800m, times.w6_800m);

  const bestImprovement = Math.max(
    parseFloat(imp100_6) || 0,
    parseFloat(imp800_6) || 0
  );
  const goalMet = bestImprovement >= 20;
  const progressToGoal = Math.min(Math.round((bestImprovement / 20) * 100), 100);

  function timeDisplay(val) {
    if (!val) return '<span class="tc-time tbd">TBD</span>';
    return `<div class="tc-time">${val}s</div>`;
  }

  function changeDisplay(val) {
    if (!val) return '';
    const n = parseFloat(val);
    return `<div class="tc-change ${n > 0 ? 'positive' : ''}">${n > 0 ? '↓' : '↑'} ${Math.abs(n)}% ${n > 0 ? 'faster' : 'slower'}</div>`;
  }

  document.getElementById('rewards-content').innerHTML = `
    <div class="rewards-hero">
      <span class="ebike-emoji">${goalMet ? '🎉' : '🚴'}</span>
      <div class="reward-title">${goalMet ? 'YOU EARNED IT!! 🎉' : 'The eBike Awaits...'}</div>
      <div class="reward-sub">${goalMet
        ? "Gagan, you hit your goal! You got 20% faster. Dad, time to order that bike! 🎊"
        : "Get 20% faster in your 100m or 800m by the end of Week 6.\nComplete your baseline run tomorrow to start the clock!"
      }</div>
      ${!goalMet ? `
        <div class="reward-locked">
          🔒 Locked until 20% improvement is reached
        </div>
      ` : ''}
    </div>

    <div class="goal-card">
      <div class="card-title">📊 Overall Program Progress</div>
      <div class="progress-bar" style="height:10px;">
        <div class="progress-fill pf-green" style="width:${pct}%"></div>
      </div>
      <div class="progress-label" style="margin-top:8px;"><span>${completed} / 42 workouts done</span><span>${pct}%</span></div>
    </div>

    ${bestImprovement > 0 ? `
    <div class="goal-card">
      <div class="card-title">🎯 Progress to eBike Goal (20% faster)</div>
      <div class="progress-bar" style="height:14px;margin-top:8px;">
        <div class="progress-fill pf-orange" style="width:${progressToGoal}%"></div>
      </div>
      <div class="progress-label" style="margin-top:8px;">
        <span>Best improvement: ${bestImprovement.toFixed(1)}%</span>
        <span>${progressToGoal}% of goal</span>
      </div>
    </div>
    ` : ''}

    <div class="goal-card">
      <div class="goal-event">⚡ 100m Dash Results</div>
      <div class="time-comparison">
        <div class="tc-box baseline">
          <div class="tc-label">Baseline</div>
          ${timeDisplay(times.baseline_100m)}
        </div>
        <div class="tc-box week3">
          <div class="tc-label">Week 3</div>
          ${timeDisplay(times.w3_100m)}
          ${changeDisplay(imp100_3)}
        </div>
        <div class="tc-box week6">
          <div class="tc-label">Week 6</div>
          ${timeDisplay(times.w6_100m)}
          ${changeDisplay(imp100_6)}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${!times.baseline_100m ? `<button class="enter-time-btn" onclick="openModal('gagan','100m','baseline')">📝 Enter Baseline Time</button>` : ''}
        ${times.baseline_100m && !times.w3_100m ? `<button class="enter-time-btn" onclick="openModal('gagan','100m','w3')">📝 Enter Week 3 Time</button>` : ''}
        ${times.baseline_100m && times.w3_100m && !times.w6_100m ? `<button class="enter-time-btn" onclick="openModal('gagan','100m','w6')">📝 Enter Week 6 Time</button>` : ''}
      </div>
    </div>

    <div class="goal-card">
      <div class="goal-event">🏃 800m Run Results</div>
      <div class="time-comparison">
        <div class="tc-box baseline">
          <div class="tc-label">Baseline</div>
          ${timeDisplay(times.baseline_800m)}
        </div>
        <div class="tc-box week3">
          <div class="tc-label">Week 3</div>
          ${timeDisplay(times.w3_800m)}
          ${changeDisplay(imp800_3)}
        </div>
        <div class="tc-box week6">
          <div class="tc-label">Week 6</div>
          ${timeDisplay(times.w6_800m)}
          ${changeDisplay(imp800_6)}
        </div>
      </div>
      <div style="display:flex;gap:8px;flex-wrap:wrap;">
        ${!times.baseline_800m ? `<button class="enter-time-btn" onclick="openModal('gagan','800m','baseline')">📝 Enter Baseline Time</button>` : ''}
        ${times.baseline_800m && !times.w3_800m ? `<button class="enter-time-btn" onclick="openModal('gagan','800m','w3')">📝 Enter Week 3 Time</button>` : ''}
        ${times.baseline_800m && times.w3_800m && !times.w6_800m ? `<button class="enter-time-btn" onclick="openModal('gagan','800m','w6')">📝 Enter Week 6 Time</button>` : ''}
      </div>
    </div>

    <div class="card" style="background:linear-gradient(135deg,#1a1200,#0d0d00);border-color:rgba(255,214,0,0.2);text-align:center;padding:24px;">
      <div style="font-size:2.5rem;">🚴⚡🏆</div>
      <div style="font-weight:900;font-size:1.1rem;margin-top:10px;">The Goal: 20% Faster</div>
      <div style="color:var(--text2);font-size:0.82rem;margin-top:8px;line-height:1.6;">
        Gagan, you run tomorrow's baseline. Then you train every single day for 6 weeks.
        At Week 3 and Week 6 you retest. Hit 20% faster and the eBike is yours. 🔥
      </div>
    </div>
  `;
}

// ═══════════════════════════════════════════
//  TIME ENTRY MODAL
// ═══════════════════════════════════════════
function openModal(user, event, checkpoint) {
  modalContext = { user, event, checkpoint };
  const labels = {
    baseline: 'Baseline (today)',
    w3: 'Week 3 Retest',
    w6: 'Week 6 Final'
  };
  document.getElementById('modal-title').textContent = `Enter ${event} Time — ${labels[checkpoint]}`;
  document.getElementById('modal-label').textContent = `Time in seconds (e.g. 14.5 for 100m, or 185 for 800m)`;
  document.getElementById('modal-input').value = '';
  document.getElementById('time-modal').classList.add('show');
  setTimeout(() => document.getElementById('modal-input').focus(), 100);
}

function closeModal() {
  document.getElementById('time-modal').classList.remove('show');
  modalContext = null;
}

function saveTime() {
  if (!modalContext) return;
  const val = document.getElementById('modal-input').value.trim();
  if (!val) return;

  // Parse time - accept seconds as number
  const num = parseFloat(val.replace(',', '.'));
  if (isNaN(num)) { showToast('Please enter a valid number'); return; }

  const { user, event, checkpoint } = modalContext;
  const times = getTimes(user);
  const key = `${checkpoint}_${event.replace('m', '')}m`;

  // Map to correct key
  const keyMap = {
    'baseline_100m': 'baseline_100m',
    'w3_100m': 'w3_100m',
    'w6_100m': 'w6_100m',
    'baseline_800m': 'baseline_800m',
    'w3_800m': 'w3_800m',
    'w6_800m': 'w6_800m',
  };
  const actualKey = keyMap[key];
  if (actualKey) times[actualKey] = num;
  saveTimes(user, times);

  closeModal();
  showToast(`✅ ${event} time saved: ${num}s`);
  renderRewards();
}

// ═══════════════════════════════════════════
//  TOAST
// ═══════════════════════════════════════════
function showToast(msg) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), 2800);
}

// Close modal on overlay click
document.getElementById('time-modal').addEventListener('click', function(e) {
  if (e.target === this) closeModal();
});

// Enter key in modal
document.getElementById('modal-input').addEventListener('keydown', function(e) {
  if (e.key === 'Enter') saveTime();
});
</script>
